production:
  sync_pvp_leaderboards:
    class: Pvp::SyncCurrentSeasonLeaderboardsJob
    queue: default
    schedule: every 6 hours

  sync_talent_trees:
    class: SyncTalentTreesJob
    queue: default
    args:
      force: true
    schedule: every day at 3am

  ensure_meta_translations:
    class: EnsureMetaTranslationsJob
    queue: default
    schedule: every 12 hours

  detect_stale_cycle:
    class: Pvp::DetectStaleCycleJob
    queue: default
    schedule: every 30 minutes

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  purge_old_job_metrics:
    command: "JobPerformanceMetric.where('created_at < ?', 7.days.ago).delete_all"
    schedule: every day at 4am

  purge_old_sync_cycles:
    command: "PvpSyncCycle.where(status: %w[completed failed aborted]).where('created_at < ?', 30.days.ago).delete_all"
    schedule: every day at 4am
