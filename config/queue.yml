default: &base
  dispatchers:
    - polling_interval: 0.5
      batch_size: 100

  # Single worker for development — both region queues + everything else.
  # Set SOLID_QUEUE_THREADS >= PVP_SYNC_THREADS so safe_concurrency math is correct.
  workers:
    - queues:
        - character_sync_us
        - character_sync_eu
        - pvp_sync_2v2
        - pvp_sync_3v3
        - pvp_sync_rbg
        - pvp_sync_shuffle
        - pvp_processing
        - "*"
      threads: <%= ENV.fetch("SOLID_QUEUE_THREADS", 10) %>
      processes: 1
      polling_interval: 0.25

development:
  <<: *base

production: &production
  dispatchers:
    - polling_interval: 0.5
      batch_size: 100

  workers:
    # US characters — dedicated worker so a Blizzard US rate-limit never stalls EU.
    # PVP_SYNC_THREADS controls SolidQueue parallelism AND safe_concurrency math inside
    # SyncCharacterBatchJob. Both US and EU workers run in the same process and share
    # DB_POOL, so safe_concurrency divides by THREADS * PROCESSES * REGIONS (2).
    #   per_thread = floor(DB_POOL / (PVP_SYNC_THREADS * PVP_CHARACTER_SYNC_PROCESSES * 2)) - 1
    #   8 threads, 1 process  → 7 chars/job → 7×8×2=112 peak connections (safe under pool of 130)
    #   8 threads, 2 processes → 3 chars/job → 3×16×2=96 peak connections (safe, 2× throughput)
    - queues: [character_sync_us]
      threads: <%= ENV.fetch("PVP_SYNC_THREADS", 8) %>
      processes: <%= ENV.fetch("PVP_CHARACTER_SYNC_PROCESSES", 1) %>
      polling_interval: 0.25

    # EU characters — independent from US, separate Blizzard rate-limit bucket.
    - queues: [character_sync_eu]
      threads: <%= ENV.fetch("PVP_SYNC_THREADS", 8) %>
      processes: <%= ENV.fetch("PVP_CHARACTER_SYNC_PROCESSES", 1) %>
      polling_interval: 0.25

    # Leaderboard sync + bracket-specific queues
    - queues:
        - pvp_sync_2v2
        - pvp_sync_3v3
        - pvp_sync_rbg
        - pvp_sync_shuffle
      threads: <%= ENV.fetch("PVP_SYNC_THREADS", 3) %>
      processes: 1
      polling_interval: 0.25

    # CPU-bound: aggregations + default catch-all
    - queues: [pvp_processing, "*"]
      threads: <%= ENV.fetch("PVP_PROCESSING_THREADS", 3) %>
      processes: 1
      polling_interval: 0.25

# Low-resource profile for cheap cloud instances (2 vCPU, 2GB RAM)
# Use with: QUEUE_PROFILE=low_resource
low_resource:
  dispatchers:
    - polling_interval: 1.0
      batch_size: 50

  workers:
    - queues: "*"
      threads: 2
      processes: 1
      polling_interval: 1.0
